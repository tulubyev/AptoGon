<svg xmlns="http://www.w3.org/2000/svg" width="600" height="200" viewBox="0 0 600 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d1b69"/>
      <stop offset="50%" style="stop-color:#4c1d95"/>
      <stop offset="100%" style="stop-color:#0c4a6e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#67e8f9"/>
    </linearGradient>
    <linearGradient id="badge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="200" fill="url(#bg)" rx="16"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.07" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="40" x2="600" y2="40"/>
    <line x1="0" y1="80" x2="600" y2="80"/>
    <line x1="0" y1="120" x2="600" y2="120"/>
    <line x1="0" y1="160" x2="600" y2="160"/>
    <line x1="100" y1="0" x2="100" y2="200"/>
    <line x1="200" y1="0" x2="200" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="400" y1="0" x2="400" y2="200"/>
    <line x1="500" y1="0" x2="500" y2="200"/>
  </g>

  <!-- Glow circles -->
  <circle cx="520" cy="40" r="80" fill="#7c3aed" opacity="0.15"/>
  <circle cx="80" cy="160" r="60" fill="#06b6d4" opacity="0.12"/>

  <!-- Badge icon -->
  <rect x="40" y="60" width="64" height="64" rx="18" fill="url(#badge)"/>
  <text x="72" y="103" font-family="system-ui, sans-serif" font-size="32" fill="white" font-weight="900" text-anchor="middle">✦</text>

  <!-- Title -->
  <text x="124" y="95" font-family="Inter, system-ui, sans-serif" font-size="28" fill="white" font-weight="900" letter-spacing="-0.5">HOMO SAPIENCE</text>

  <!-- Gradient underline -->
  <rect x="124" y="102" width="200" height="3" rx="2" fill="url(#accent)"/>

  <!-- Subtitle -->
  <text x="124" y="128" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#c4b5fd" font-weight="500">Верификация людей в интернете</text>

  <!-- Bottom row: tech tags -->
  <rect x="40" y="148" width="72" height="24" rx="6" fill="rgba(124,58,237,0.35)"/>
  <text x="76" y="164" font-family="monospace" font-size="11" fill="#a78bfa" text-anchor="middle" font-weight="700">did:key</text>

  <rect x="120" y="148" width="64" height="24" rx="6" fill="rgba(6,182,212,0.25)"/>
  <text x="152" y="164" font-family="monospace" font-size="11" fill="#67e8f9" text-anchor="middle" font-weight="700">Aptos</text>

  <rect x="192" y="148" width="90" height="24" rx="6" fill="rgba(255,255,255,0.08)"/>
  <text x="237" y="164" font-family="monospace" font-size="11" fill="#94a3b8" text-anchor="middle" font-weight="600">open-source</text>

  <!-- Domain -->
  <text x="560" y="175" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#64748b" text-anchor="end" font-weight="500">homosapience.org</text>
</svg>
