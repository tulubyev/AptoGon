# nginx конфиг для работы на порту 8080 (бэкенд для Traefik)
# SSL убран — им занимается Traefik
# Установить: sudo cp nginx-8080.conf /etc/nginx/sites-available/static-8080
#              sudo ln -s /etc/nginx/sites-available/static-8080 /etc/nginx/sites-enabled/
#              sudo nginx -t && sudo systemctl reload nginx

# ── baikal.yachts ─────────────────────────────────────────────────────────
server {
    listen 8080;
    server_name baikal.yachts www.baikal.yachts;

    root /var/www/baikal-yachts/dist/public;

    location /favicon.svg { alias /var/www/baikal-yachts/public/favicon.svg; }
    location /sw.js       { alias /var/www/baikal-yachts/public/sw.js; }
    location /manifest.json { alias /var/www/baikal-yachts/public/manifest.json; }

    location /uploads/ {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /api/ {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ── lastmiles.ru ──────────────────────────────────────────────────────────
server {
    listen 8080;
    server_name lastmiles.ru;

    root /var/www/lastmiles/apps/web/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|woff2?|png|jpg|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
