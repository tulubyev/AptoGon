# Traefik dynamic config — маршруты для не-Docker сервисов
# Файл монтируется в Traefik контейнер как /etc/traefik/dynamic.yml

http:
  routers:

    # ── baikal.yachts — статика + API на :5000 (через nginx:8080) ──────────
    baikal:
      rule: "Host(`baikal.yachts`) || Host(`www.baikal.yachts`)"
      entrypoints: [websecure]
      service: nginx-static
      tls:
        certResolver: letsencrypt

    # ── lastmiles.ru — статика (через nginx:8080) ───────────────────────────
    lastmiles:
      rule: "Host(`lastmiles.ru`)"
      entrypoints: [websecure]
      service: nginx-static
      tls:
        certResolver: letsencrypt

    # ── api.lastmiles.ru — delivery-api Docker :3100 ────────────────────────
    lastmiles-api:
      rule: "Host(`api.lastmiles.ru`)"
      entrypoints: [websecure]
      service: lastmiles-api-svc
      tls:
        certResolver: letsencrypt

    # ── worldsafetyindex.org /api/ — PM2 :3001 (приоритет выше) ────────────
    worldsafety-api:
      rule: "Host(`worldsafetyindex.org`) && PathPrefix(`/api/`)"
      entrypoints: [websecure]
      service: worldsafety-api-svc
      priority: 20
      tls:
        certResolver: letsencrypt

    # ── worldsafetyindex.org — PM2 frontend :3000 ───────────────────────────
    worldsafety:
      rule: "Host(`worldsafetyindex.org`) || Host(`www.worldsafetyindex.org`)"
      entrypoints: [websecure]
      service: worldsafety-frontend
      priority: 10
      tls:
        certResolver: letsencrypt

    # ── zenya.spa — proxy :5000 ─────────────────────────────────────────────
    zenya:
      rule: "Host(`zenya.spa`) || Host(`www.zenya.spa`)"
      entrypoints: [websecure]
      service: zenya-svc
      tls:
        certResolver: letsencrypt

  services:

    # nginx на 8080 для статических сайтов (baikal, lastmiles)
    nginx-static:
      loadBalancer:
        servers:
          - url: "http://172.28.0.1:8080"

    # delivery-api Docker контейнер
    lastmiles-api-svc:
      loadBalancer:
        servers:
          - url: "http://172.28.0.1:3100"

    # worldsafetyindex frontend (PM2)
    worldsafety-frontend:
      loadBalancer:
        servers:
          - url: "http://172.28.0.1:3000"

    # worldsafetyindex api (PM2)
    worldsafety-api-svc:
      loadBalancer:
        servers:
          - url: "http://172.28.0.1:3001"

    # zenya.spa
    zenya-svc:
      loadBalancer:
        servers:
          - url: "http://172.28.0.1:5000"

  middlewares:
    # IP whitelist для n8n (добавляется label на контейнер)
    n8n-ipwhitelist:
      ipAllowList:
        sourceRange:
          - "46.254.243.52/32"
