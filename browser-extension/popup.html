<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HSI Verified Human</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 300px;
      font-family: Inter, system-ui, sans-serif;
      background: #faf5ff;
      color: #111827;
    }

    .header {
      background: linear-gradient(135deg, #2d1b69, #4c1d95);
      padding: 20px 18px 16px;
      text-align: center;
    }
    .header .logo {
      font-size: 28px;
      margin-bottom: 6px;
    }
    .header h1 {
      font-size: 15px;
      font-weight: 800;
      color: #fff;
      margin-bottom: 2px;
    }
    .header .sub {
      font-size: 10px;
      color: #c4b5fd;
      font-weight: 500;
      letter-spacing: 0.05em;
    }

    .body { padding: 16px; }

    /* Status card */
    .status-card {
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 14px;
      text-align: center;
    }
    .status-card.valid {
      background: linear-gradient(135deg, #f0fdf4, #ecfdf5);
      border: 1.5px solid #86efac;
    }
    .status-card.expired {
      background: #fff7ed;
      border: 1.5px solid #fed7aa;
    }
    .status-card.none {
      background: #f9fafb;
      border: 1.5px solid #e5e7eb;
    }

    .status-icon { font-size: 32px; margin-bottom: 8px; }
    .status-title { font-weight: 800; font-size: 15px; margin-bottom: 4px; }
    .status-title.valid { color: #059669; }
    .status-title.expired { color: #d97706; }
    .status-title.none { color: #6b7280; }
    .status-sub { font-size: 11px; color: #9ca3af; line-height: 1.5; }

    /* Details rows */
    .details {
      background: white;
      border-radius: 12px;
      border: 1px solid #e9d5ff;
      margin-bottom: 14px;
      overflow: hidden;
    }
    .detail-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 9px 14px;
      font-size: 12px;
      border-bottom: 1px solid #f3e8ff;
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-label { color: #9ca3af; font-weight: 500; }
    .detail-value { color: #374151; font-weight: 600; font-family: monospace; font-size: 11px; }
    .detail-value.good { color: #059669; }
    .detail-value.warn { color: #d97706; }

    /* Buttons */
    .btn {
      display: block;
      width: 100%;
      padding: 11px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      text-align: center;
      cursor: pointer;
      border: none;
      text-decoration: none;
      margin-bottom: 8px;
    }
    .btn-primary {
      background: linear-gradient(135deg, #7c3aed, #06b6d4);
      color: white;
    }
    .btn-secondary {
      background: white;
      color: #7c3aed;
      border: 1.5px solid #e9d5ff;
    }
    .btn:hover { opacity: 0.9; }

    /* Footer */
    .footer {
      text-align: center;
      padding: 10px 16px 14px;
      font-size: 10px;
      color: #d1d5db;
    }
    .footer a { color: #a78bfa; text-decoration: none; }

    /* Loading */
    .loading { text-align: center; padding: 32px 16px; color: #9ca3af; font-size: 13px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">✦</div>
    <h1>Verified Human</h1>
    <div class="sub">HOMO SAPIENCE INTERNET</div>
  </div>

  <div class="body" id="body">
    <div class="loading">Загрузка...</div>
  </div>

  <div class="footer">
    <a href="https://homosapience.org" target="_blank">homosapience.org</a>
    &nbsp;·&nbsp;
    <a href="https://homosapience.org/manifest" target="_blank">Манифест</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
