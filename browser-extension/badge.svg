<svg xmlns="http://www.w3.org/2000/svg" width="120" height="32" viewBox="0 0 120 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0)"/>
      <stop offset="50%" style="stop-color:rgba(255,255,255,0.15)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-1 0;1 0;-1 0" dur="2s" repeatCount="indefinite"/>
    </linearGradient>
  </defs>
  <rect width="120" height="32" rx="16" fill="url(#bg)"/>
  <rect width="120" height="32" rx="16" fill="url(#shimmer)"/>
  <text x="16" y="21" font-family="Inter, system-ui, sans-serif" font-size="14" fill="white" font-weight="800">✦</text>
  <text x="32" y="21" font-family="Inter, system-ui, sans-serif" font-size="11" fill="white" font-weight="700">HUMAN</text>
</svg>
